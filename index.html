<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球分隊專家系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        // 確保 React 在全域變數中，供 Lucide UMD 使用
        window.React = React;
        window.ReactDOM = ReactDOM;
    </script>
    <!-- 載入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖示庫 (Vanilla 版本，最穩定) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 使用 Vanilla Lucide 手動建立 React 組件
        const createLucideIcon = (iconName) => {
            const defaultAttrs = {
                xmlns: "http://www.w3.org/2000/svg",
                width: 24,
                height: 24,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: 2,
                strokeLinecap: "round",
                strokeLinejoin: "round",
            };

            return (props) => {
                const iconChildren = window.lucide.icons[iconName];
                if (!iconChildren) {
                    console.warn(`Icon ${iconName} not found`);
                    return null;
                }
                
                return React.createElement(
                    'svg',
                    {
                        ...defaultAttrs,
                        ...props,
                        width: props.size || props.width || defaultAttrs.width,
                        height: props.size || props.height || defaultAttrs.height,
                        className: `lucide lucide-${iconName.toLowerCase()} ${props.className || ''}`
                    },
                    iconChildren.map((child, i) => 
                        React.createElement(child[0], { key: i, ...child[1] })
                    )
                );
            };
        };

        const Users = createLucideIcon('Users');
        const UserPlus = createLucideIcon('UserPlus');
        const Trash2 = createLucideIcon('Trash2');
        const Shuffle = createLucideIcon('Shuffle');
        const Star = createLucideIcon('Star');
        const Trophy = createLucideIcon('Trophy');
        const Edit2 = createLucideIcon('Edit2');
        const UserCheck = createLucideIcon('UserCheck');
        const UserMinus = createLucideIcon('UserMinus');
        const CheckCircle2 = createLucideIcon('CheckCircle2');
        const XCircle = createLucideIcon('XCircle');
        const Activity = createLucideIcon('Activity');
        const Plus = createLucideIcon('Plus');
        const Lock = createLucideIcon('Lock');
        const Unlock = createLucideIcon('Unlock');
        const RefreshCw = createLucideIcon('RefreshCw');
        const GripVertical = createLucideIcon('GripVertical');

        /**
         * 籃球分隊專家系統 - 生產級核心架構
         */

        // --- 輔助邏輯與常數 ---
        const POSITION_ORDER = { 'C': 1, 'F': 2, 'G': 3 };

        const getPowerColor = (power) => {
            const p = Math.min(100, Math.max(0, power));
            const hue = 220 - (p * 2.2); 
            const lightness = 85 - (p * 0.45);
            const saturation = 40 + (p * 0.5);
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        };

        const getPosStyle = (pos, isEditable) => {
            if (!pos) return 'bg-slate-50 text-slate-300';
            switch(pos) {
                case 'C': return `bg-blue-600 text-white`;
                case 'F': return `bg-green-600 text-white`;
                case 'G': return `bg-purple-600 text-white`;
                default: return 'bg-slate-100 text-slate-400';
            }
        };

        // --- 子組件：名單表格 ---
        const PlayerTable = ({ title, data, icon: Icon, color, onUpdate, onToggle, onRemove, deleteConfirmId, isEditable, onToggleEdit }) => {
            const activeCount = data.filter(p => p.active).length;

            return (
                <div className={`bg-white rounded-3xl shadow-sm border transition-all duration-300 ${isEditable ? 'border-orange-300 ring-4 ring-orange-50/50' : 'border-slate-100'} overflow-hidden mb-8`}>
                    <div className={`p-4 border-b border-slate-100 flex justify-between items-center ${isEditable ? 'bg-orange-50/50' : `bg-${color}-50/30`}`}>
                        <div className="flex items-center gap-3">
                            <Icon className={`w-5 h-5 ${isEditable ? 'text-orange-500' : `text-${color}-500`}`} />
                            <h2 className="text-lg font-bold text-slate-700">{title}</h2>
                            <div className="flex items-center bg-white/80 px-2 py-0.5 rounded-full border border-slate-200 shadow-sm">
                                <span className={`text-xs font-black text-${color}-600`}>{activeCount}</span>
                                <span className="text-[10px] text-slate-300 mx-1">/</span>
                                <span className="text-[10px] font-bold text-slate-400">{data.length}</span>
                            </div>
                        </div>
                        <button 
                            onClick={onToggleEdit} 
                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${
                                isEditable ? 'bg-orange-600 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                            }`}
                        >
                            {isEditable ? <Unlock className="w-3.5 h-3.5" /> : <Lock className="w-3.5 h-3.5" />}
                            {isEditable ? '完成編輯' : '編輯名單'}
                        </button>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <tbody className="divide-y divide-slate-100">
                                {data.map((player) => (
                                    <tr key={player.id} className={`transition-all duration-200 ${!player.active ? 'bg-slate-50/30 opacity-60' : 'hover:bg-slate-50/80'}`}>
                                        <td className="px-6 py-3 w-10">
                                            <input type="checkbox" checked={player.active} onChange={() => onToggle(player.id)} className="w-5 h-5 rounded border-slate-300 cursor-pointer" />
                                        </td>
                                        <td className="px-6 py-3 min-w-[120px]">
                                            {isEditable ? (
                                                <input type="text" value={player.name} onChange={(e) => onUpdate(player.id, 'name', e.target.value)} className="bg-slate-50 border-b border-orange-200 focus:border-orange-500 focus:outline-none font-bold text-slate-800 px-1 py-0.5 w-full" />
                                            ) : (
                                                <span className="font-bold text-slate-800">{player.name}</span>
                                            )}
                                        </td>
                                        <td className="px-6 py-3">
                                            <div className="flex items-center justify-center gap-1.5">
                                                <select disabled={!isEditable} value={player.position} onChange={(e) => onUpdate(player.id, 'position', e.target.value)} className={`px-2 py-1 rounded text-[10px] font-black tracking-tighter transition-all focus:outline-none ${getPosStyle(player.position, isEditable)} ${!isEditable ? 'appearance-none' : 'cursor-pointer hover:ring-2 hover:ring-orange-200'}`}>
                                                    <option value="G">G</option><option value="F">F</option><option value="C">C</option>
                                                </select>
                                                <select disabled={!isEditable} value={player.subPosition || 'None'} onChange={(e) => onUpdate(player.id, 'subPosition', e.target.value)} className={`px-2 py-1 rounded text-[10px] font-black tracking-tighter transition-all focus:outline-none ${getPosStyle(player.subPosition, isEditable)} ${!isEditable ? 'appearance-none' : 'cursor-pointer hover:ring-2 hover:ring-orange-200'}`}>
                                                    <option value="None">-</option><option value="G">G</option><option value="F">F</option><option value="C">C</option>
                                                </select>
                                            </div>
                                        </td>
                                        <td className="px-6 py-3">
                                            <div className="flex flex-col gap-1 max-w-[100px] mx-auto">
                                                <div className="flex justify-between items-center text-[10px] font-bold">
                                                    <span className="text-slate-400">PW</span>
                                                    {isEditable ? (
                                                        <input type="number" value={player.power} onChange={(e) => onUpdate(player.id, 'power', parseInt(e.target.value))} className="w-8 text-right bg-transparent focus:outline-none font-black" style={{ color: getPowerColor(player.power) }} />
                                                    ) : (
                                                        <span style={{ color: getPowerColor(player.power) }}>{player.power}</span>
                                                    )}
                                                </div>
                                                <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full rounded-full transition-all duration-500" style={{ width: `${player.power}%`, backgroundColor: getPowerColor(player.power) }} />
                                                </div>
                                                {isEditable && (
                                                    <input type="range" min="1" max="100" value={player.power} onChange={(e) => onUpdate(player.id, 'power', parseInt(e.target.value))} className="w-full h-1 mt-1 cursor-pointer accent-orange-500" />
                                                )}
                                            </div>
                                        </td>
                                        <td className="px-6 py-3 text-right">
                                            {isEditable && (
                                                <button onClick={() => onRemove(player.id)} className="text-slate-300 hover:text-red-500 p-2 transition-colors">
                                                    {deleteConfirmId === player.id ? <CheckCircle2 className="w-4 h-4 text-red-500 animate-pulse" /> : <Trash2 className="w-4 h-4" />}
                                                </button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- 主組件 ---
        const App = () => {
            const [players, setPlayers] = useState(() => {
                const saved = localStorage.getItem('bball_pro_players');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: '小吳', power: 85, position: 'F', subPosition: 'C', active: true, category: 'long-term' },
                    { id: 2, name: 'peja', power: 92, position: 'F', subPosition: 'G', active: true, category: 'long-term' },
                    { id: 3, name: '老賴', power: 75, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 4, name: '阿暉', power: 80, position: 'G', subPosition: null, active: false, category: 'long-term' },
                    { id: 5, name: '德聖', power: 88, position: 'F', subPosition: 'C', active: true, category: 'long-term' },
                    { id: 6, name: '阿金', power: 65, position: 'F', subPosition: null, active: false, category: 'long-term' },
                    { id: 7, name: '小葉', power: 72, position: 'F', subPosition: null, active: false, category: 'long-term' },
                    { id: 8, name: '得慶', power: 82, position: 'F', subPosition: 'C', active: true, category: 'long-term' },
                    { id: 9, name: '宏ㄟ', power: 78, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 10, name: '豪哥', power: 95, position: 'F', subPosition: 'G', active: true, category: 'long-term' },
                    { id: 11, name: '阿倫', power: 84, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 12, name: '小楊', power: 81, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 13, name: '柏宇', power: 70, position: 'F', subPosition: null, active: false, category: 'long-term' },
                    { id: 14, name: '仲強', power: 74, position: 'F', subPosition: null, active: false, category: 'long-term' },
                    { id: 15, name: '阿傑', power: 86, position: 'F', subPosition: 'C', active: true, category: 'long-term' },
                    { id: 16, name: 'Eason', power: 89, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 17, name: '亞倫', power: 83, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 18, name: '陳佑新', power: 90, position: 'F', subPosition: 'C', active: true, category: 'long-term' },
                    { id: 19, name: '人豪', power: 79, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 20, name: '芭樂', power: 77, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 21, name: 'Scott', power: 68, position: 'F', subPosition: null, active: false, category: 'long-term' },
                    { id: 22, name: 'willy', power: 82, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 23, name: '威辰', power: 85, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 24, name: '謝勇志', power: 88, position: 'F', subPosition: null, active: true, category: 'long-term' },
                    { id: 101, name: '小曹', power: 80, position: 'F', subPosition: 'C', active: true, category: 'reserve' },
                    { id: 102, name: '芋頭', power: 80, position: 'F', subPosition: null, active: true, category: 'reserve' },
                    { id: 103, name: '志傑', power: 80, position: 'G', subPosition: 'F', active: true, category: 'reserve' },
                    { id: 104, name: '宥勳', power: 80, position: 'F', subPosition: null, active: true, category: 'reserve' },
                ];
            });

            const [newPlayer, setNewPlayer] = useState({ name: '', power: 80, position: 'F', subPosition: 'None' });
            const [targetCategory, setTargetCategory] = useState('reserve'); 
            const [teams, setTeams] = useState([]);
            const [activeTab, setActiveTab] = useState('players');
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);
            const [editModes, setEditModes] = useState({ 'long-term': false, 'reserve': false });
            const [isRerolling, setIsRerolling] = useState(false);
            const [draggedPlayer, setDraggedPlayer] = useState(null);

            const teamCount = 4;

            useEffect(() => {
                localStorage.setItem('bball_pro_players', JSON.stringify(players));
            }, [players]);

            const toggleEditMode = (category) => setEditModes(prev => ({ ...prev, [category]: !prev[category] }));

            const handleAddPlayer = () => {
                if (!newPlayer.name.trim()) return;
                const playerToAdd = {
                    ...newPlayer,
                    id: Date.now(),
                    active: true,
                    category: targetCategory,
                    subPosition: newPlayer.subPosition === 'None' ? null : newPlayer.subPosition
                };
                setPlayers([...players, playerToAdd]);
                setNewPlayer({ name: '', power: 80, position: 'F', subPosition: 'None' });
            };

            const removePlayer = (id) => {
                if (deleteConfirmId === id) { setPlayers(players.filter(p => p.id !== id)); setDeleteConfirmId(null); } 
                else { setDeleteConfirmId(id); setTimeout(() => setDeleteConfirmId(null), 3000); }
            };
            
            const updatePlayer = (id, field, value) => setPlayers(players.map(p => p.id === id ? { ...p, [field]: (field === 'subPosition' && value === 'None' ? null : value) } : p));
            const toggleActive = (id) => updatePlayer(id, 'active', !players.find(p => p.id === id).active);

            const generateTeams = () => {
                const activePlayers = players.filter(p => p.active);
                if (activePlayers.length < teamCount) return;
                setIsRerolling(true);
                setTimeout(() => {
                    const sortedPlayers = [...activePlayers].sort((a, b) => (b.power !== a.power ? b.power - a.power : Math.random() - 0.5));
                    let resultTeams = Array.from({ length: teamCount }, () => ({ members: [], totalPower: 0 }));
                    sortedPlayers.forEach((player) => {
                        resultTeams.sort((a, b) => a.totalPower - b.totalPower);
                        resultTeams[0].members.push(player);
                        resultTeams[0].totalPower += player.power;
                    });
                    setTeams(resultTeams);
                    setIsRerolling(false);
                    setActiveTab('teams');
                }, 400);
            };

            const handleOnDrop = (e, targetTeamIdx) => {
                e.preventDefault();
                if (draggedPlayer === null || draggedPlayer.fromTeamIdx === targetTeamIdx) return;
                const newTeams = [...teams];
                const { player, fromTeamIdx } = draggedPlayer;
                newTeams[fromTeamIdx].members = newTeams[fromTeamIdx].members.filter(m => m.id !== player.id);
                newTeams[fromTeamIdx].totalPower -= player.power;
                newTeams[targetTeamIdx].members.push(player);
                newTeams[targetTeamIdx].totalPower += player.power;
                setTeams(newTeams);
                setDraggedPlayer(null);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        {/* --- Header --- */}
                        <header className="flex flex-col md:flex-row items-center justify-between mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-orange-100 p-3 rounded-2xl">
                                    <Trophy className="w-8 h-8 text-orange-600" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">籃球分隊專家系統</h1>
                                    <p className="text-slate-500 text-xs mt-1 font-bold uppercase tracking-wider">
                                        出賽人數: <span className="text-orange-600 font-black">{players.filter(p=>p.active).length}</span>
                                    </p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-2xl shadow-inner w-full md:w-auto">
                                <button onClick={() => setActiveTab('players')} className={`flex-1 md:flex-none px-8 py-2.5 rounded-xl font-black text-sm transition-all ${activeTab === 'players' ? 'bg-white text-orange-600 shadow-md scale-105' : 'text-slate-400 hover:text-slate-600'}`}>名單管理</button>
                                <button onClick={() => setActiveTab('teams')} className={`flex-1 md:flex-none px-8 py-2.5 rounded-xl font-black text-sm transition-all ${activeTab === 'teams' ? 'bg-white text-orange-600 shadow-md scale-105' : 'text-slate-400 hover:text-slate-600'}`}>分隊結果</button>
                            </div>
                        </header>

                        {activeTab === 'players' ? (
                            <div className="space-y-6">
                                {/* 快速錄入區域 */}
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 border-t-8 border-t-indigo-500">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-lg font-black flex items-center gap-2 text-indigo-700 italic"><UserPlus className="w-5 h-5" />快速報名錄入</h2>
                                        <div className="flex bg-slate-100 p-1 rounded-2xl text-[10px] font-black uppercase">
                                            <button onClick={() => setTargetCategory('long-term')} className={`px-4 py-1.5 rounded-xl transition-all ${targetCategory === 'long-term' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-400'}`}>長期班底</button>
                                            <button onClick={() => setTargetCategory('reserve')} className={`px-4 py-1.5 rounded-xl transition-all ${targetCategory === 'reserve' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-400'}`}>臨時備取</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                                        <div className="md:col-span-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">球員姓名</label>
                                            <input type="text" placeholder="名稱" value={newPlayer.name} className={`w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 outline-none transition-all ${targetCategory === 'long-term' ? 'focus:ring-orange-100 border-orange-200' : 'focus:ring-indigo-100 border-indigo-200'}`} onChange={(e) => setNewPlayer({...newPlayer, name: e.target.value})} />
                                        </div>
                                        <div className="md:col-span-3">
                                            <div className="flex justify-between items-center mb-1.5 px-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase flex items-center gap-1"><Activity className="w-3 h-3" /> 戰力評分</label>
                                                <span className="font-black text-xs" style={{ color: getPowerColor(newPlayer.power) }}>{newPlayer.power}</span>
                                            </div>
                                            <div className="w-full h-1.5 bg-slate-100 rounded-full mb-2 overflow-hidden">
                                                <div className="h-full rounded-full transition-all duration-300 shadow-sm" style={{ width: `${newPlayer.power}%`, backgroundColor: getPowerColor(newPlayer.power) }} />
                                            </div>
                                            <input type="range" min="1" max="100" value={newPlayer.power} className="w-full h-1.5 accent-indigo-500 cursor-pointer" onChange={(e) => setNewPlayer({...newPlayer, power: parseInt(e.target.value)})} />
                                        </div>
                                        <div className="md:col-span-3">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">主 / 副位置</label>
                                            <div className="flex gap-2">
                                                <select className="flex-1 px-3 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-sm" value={newPlayer.position} onChange={(e) => setNewPlayer({...newPlayer, position: e.target.value})}><option value="G">G</option><option value="F">F</option><option value="C">C</option></select>
                                                <select className="flex-1 px-3 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-sm" value={newPlayer.subPosition} onChange={(e) => setNewPlayer({...newPlayer, subPosition: e.target.value})}><option value="None">-</option><option value="G">G</option><option value="F">F</option><option value="C">C</option></select>
                                            </div>
                                        </div>
                                        <div className="md:col-span-3">
                                            <button onClick={handleAddPlayer} className={`w-full py-3 rounded-2xl font-black text-sm transition-all shadow-xl hover:scale-[1.02] active:scale-95 text-white ${targetCategory === 'long-term' ? 'bg-orange-600 hover:bg-orange-700 shadow-orange-100' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100'}`}>存入{targetCategory === 'long-term' ? '班底' : '備取'}</button>
                                        </div>
                                    </div>
                                </div>

                                <PlayerTable title="長期名單 (核心成員)" data={players.filter(p => p.category === 'long-term')} icon={UserCheck} color="orange" onUpdate={updatePlayer} onToggle={toggleActive} onRemove={removePlayer} deleteConfirmId={deleteConfirmId} isEditable={editModes['long-term']} onToggleEdit={() => toggleEditMode('long-term')} />
                                <PlayerTable title="本週備取名單" data={players.filter(p => p.category === 'reserve')} icon={UserMinus} color="indigo" onUpdate={updatePlayer} onToggle={toggleActive} onRemove={removePlayer} deleteConfirmId={deleteConfirmId} isEditable={editModes['reserve']} onToggleEdit={() => toggleEditMode('reserve')} />

                                <div className="sticky bottom-8 flex justify-center">
                                    <button onClick={generateTeams} disabled={players.filter(p=>p.active).length < teamCount || isRerolling} className="bg-slate-900 text-white px-12 py-5 rounded-[2rem] font-black text-xl shadow-2xl hover:bg-black transition-all flex items-center gap-4 border-4 border-white disabled:opacity-50">
                                        {isRerolling ? <RefreshCw className="w-7 h-7 animate-spin" /> : <Shuffle className="w-7 h-7" />}立即分四隊
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 pb-20">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {teams.map((team, idx) => {
                                        const sortedMembers = [...team.members].sort((a, b) => {
                                            const pA = POSITION_ORDER[a.position] || 99;
                                            const pB = POSITION_ORDER[b.position] || 99;
                                            if (pA !== pB) return pA - pB;
                                            return b.power - a.power;
                                        });

                                        return (
                                            <div 
                                                key={idx} 
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={(e) => handleOnDrop(e, idx)}
                                                className={`bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border transition-all duration-300 flex flex-col ${draggedPlayer && draggedPlayer.fromTeamIdx !== idx ? 'ring-8 ring-orange-400 ring-dashed scale-105 bg-orange-50/30' : 'border-slate-100'}`}
                                            >
                                                <div className={`p-6 ${idx === 0 ? 'bg-orange-500' : idx === 1 ? 'bg-indigo-600' : idx === 2 ? 'bg-orange-700' : 'bg-slate-800'} text-white`}>
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <h3 className="text-4xl font-black italic tracking-tighter uppercase">Group {['A', 'B', 'C', 'D'][idx]}</h3>
                                                            <p className="text-white/60 text-[10px] mt-1 font-black tracking-widest uppercase">{team.members.length} Players</p>
                                                        </div>
                                                        <div className="bg-white/20 p-3 rounded-2xl">
                                                            <Trophy className="w-6 h-6 text-white" />
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="p-4 space-y-2.5 flex-grow min-h-[400px]">
                                                    {sortedMembers.map((member) => (
                                                        <div 
                                                            key={member.id} 
                                                            draggable 
                                                            onDragStart={() => setDraggedPlayer({ player: member, fromTeamIdx: idx })} 
                                                            onDragEnd={() => setDraggedPlayer(null)} 
                                                            className="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-3xl cursor-grab active:cursor-grabbing hover:border-orange-300 hover:shadow-xl hover:-translate-y-1 transition-all group/item"
                                                        >
                                                            <div className="flex items-center gap-3">
                                                                <GripVertical className="w-4 h-4 text-slate-300 group-hover/item:text-orange-400" />
                                                                <div className={`w-9 h-9 rounded-2xl flex items-center justify-center font-black text-xs shadow-sm ${member.category === 'long-term' ? 'bg-orange-50 text-orange-500' : 'bg-indigo-50 text-indigo-500'}`}>
                                                                    {member.name[0]}
                                                                </div>
                                                                <div>
                                                                    <div className="font-black text-sm text-slate-800">{member.name}</div>
                                                                    <div className="flex items-center gap-1.5 mt-0.5">
                                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm ${getPosStyle(member.position, false)}`}>{member.position}</span>
                                                                        {member.subPosition && <span className="text-[9px] text-slate-400 font-bold uppercase italic">/ {member.subPosition}</span>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div className="h-8 w-2 rounded-full shadow-inner" style={{ backgroundColor: getPowerColor(member.power) }} />
                                                        </div>
                                                    ))}
                                                    {team.members.length === 0 && (
                                                        <div className="h-full flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[2rem] py-16 text-slate-300">
                                                             <Shuffle className="w-10 h-10 mb-2 opacity-20" />
                                                             <span className="font-black uppercase text-xs tracking-tighter">Empty Group</span>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="p-5 border-t border-slate-800 flex justify-between items-center bg-slate-900 text-white">
                                                    <div className="flex flex-col">
                                                        <span className="text-[9px] text-slate-500 font-black uppercase tracking-widest">Team Balance</span>
                                                        <span className="text-[10px] text-orange-500 font-bold italic">Combat Ready</span>
                                                    </div>
                                                    <div className="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-2xl border border-white/10">
                                                         <Activity className="w-4 h-4 text-orange-500" />
                                                         <span className="text-3xl font-black italic tracking-tighter">{Math.round(team.totalPower)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-8 py-12">
                                    <button onClick={() => setActiveTab('players')} className="text-slate-400 hover:text-orange-600 font-black transition-all flex items-center gap-3 group px-6 py-3 rounded-2xl hover:bg-white shadow-none hover:shadow-sm">
                                        <span className="group-hover:-translate-x-2 transition-transform text-xl">←</span> 
                                        <span>返回名單管理</span>
                                    </button>
                                    
                                    <button 
                                        onClick={generateTeams} 
                                        disabled={isRerolling} 
                                        className="bg-orange-600 text-white px-12 py-4 rounded-[2rem] font-black text-lg shadow-xl shadow-orange-200 hover:bg-orange-700 hover:scale-105 active:scale-95 transition-all flex items-center gap-3"
                                    >
                                        <RefreshCw className={`w-6 h-6 ${isRerolling ? 'animate-spin' : ''}`} />
                                        不滿意？立即重骰
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
